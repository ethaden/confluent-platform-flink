apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  replicas: 1
  dependencies:
    metricsClient:
      url: http://controlcenter.confluent.svc.cluster.local:9090
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-server:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  listeners:
      external:
        externalAccess:
          type: staticForPortBasedRouting
          staticForPortBasedRouting:
            host: kafka # Domain pointing to your Ingress controller
            portOffset: 9092
        tls:
          enabled: false
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
    metricsClient:
      url: http://controlcenter.confluent.svc.cluster.local:9090
  dataVolumeCapacity: 10Gi
  configOverrides:
    server:
      - "confluent.license.topic.replication.factor=1"
      - "confluent.metrics.reporter.topic.replicas=1"
      - "confluent.tier.metadata.replication.factor=1"
      - "confluent.metadata.topic.replication.factor=1"
      - "confluent.balancer.topic.replication.factor=1"
      - "confluent.security.event.logger.exporter.kafka.topic.replicas=1"
      - "event.logger.exporter.kafka.topic.replicas=1"
      - "confluent.cluster.link.metadata.topic.replication.factor=1"
      - "share.coordinator.state.topic.replication.factor=1"
      - "quotas.topic.replication.factor=1"
      - "offsets.topic.replication.factor=1"
      - "confluent.durability.topic.replication.factor=1"
      - "confluent.balancer.enable=false"
      - "confluent.cluster.link.enable=true"
      #- "metric.reporters=io.confluent.telemetry.reporter.TelemetryReporter"
      - "metric.reporters=io.confluent.telemetry.reporter.TelemetryReporter,org.apache.kafka.common.metrics.JmxReporter"
      #- "client.telemetry.enabled=true"
      - "confluent.telemetry.enabled=true"
      - "password.encoder.secret=secret"
      - "telemetry.metrics.enabled=true"
      - "confluent.telemetry.exporter._c3.enabled=true"
      - "confluent.telemetry.exporter._c3.type=http"
      - "confluent.telemetry.exporter._c3.client.base.url=http://controlcenter.confluent.svc.cluster.local:9090/api/v1/otlp"
      - "confluent.telemetry.exporter._c3.client.compression=gzip"
      - "confluent.telemetry.exporter._c3.api.key=dummy"
      - "confluent.telemetry.exporter._c3.api.secret=dummy"
      - "confluent.telemetry.metrics.collector.interval.ms=60000"
      - "confluent.telemetry.remoteconfig._confluent.enabled=false"
      - "confluent.telemetry.external.client.metrics.push.enabled=true"
      - "confluent.telemetry.external.client.metrics.delta.temporality=false"
      - "confluent.telemetry.external.client.metrics.subscription.interval.ms.list=60000"
      # Required for using CP-Flink: set maximal transaction timeout to be larger then the default of 60 mins in Flink
      - "transaction.max.timeout.ms=3600001"
      #- "org.apache.kafka.consumer.fetch.manager.fetch.latency.avg,org.apache.kafka.consumer.connection.creation.total,org.apache.kafka.consumer.fetch.manager.fetch.total,org.apache.kafka.consumer.fetch.manager.bytes.consumed.rate,org.apache.kafka.producer.bufferpool.wait.ratio,org.apache.kafka.producer.record.queue.time.avg,org.apache.kafka.producer.request.latency.avg,org.apache.kafka.producer.produce.throttle.time.avg,org.apache.kafka.producer.connection.creation.total,org.apache.kafka.producer.request.total,org.apache.kafka.producer.topic.byte.rate"
      - "confluent.telemetry.external.client.metrics.subscription.metrics.list=org.apache.kafka.consumer.fetch.manager.fetch.latency.avg,org.apache.kafka.consumer.connection.creation.total,org.apache.kafka.consumer.fetch.manager.fetch.total,org.apache.kafka.consumer.fetch.manager.bytes.consumed.rate,org.apache.kafka.producer.bufferpool.wait.ratio,org.apache.kafka.producer.record.queue.time.avg,org.apache.kafka.producer.request.latency.avg,org.apache.kafka.producer.produce.throttle.time.avg,org.apache.kafka.producer.connection.creation.total,org.apache.kafka.producer.request.total,org.apache.kafka.producer.topic.byte.rate,org.apache.kafka.consumer.share.fetch.manager.fetch.latency.avg,org.apache.kafka.consumer.share.fetch.manager.fetch.total,org.apache.kafka.consumer.share.fetch.manager.bytes.consumed.rate"
      - "confluent.telemetry.exporter._c3.metrics.include=io.confluent.kafka.server.request.(?!.*delta).*|io.confluent.kafka.server.socket_server.connections|io.confluent.kafka.server.server.broker.state|io.confluent.kafka.server.replica.manager.leader.count|io.confluent.kafka.server.request.queue.size|io.confluent.kafka.server.broker.topic.failed.produce.requests.rate.1.min|io.confluent.kafka.server.tier.archiver.total.lag|io.confluent.kafka.server.request.total.time.ms.p99|io.confluent.kafka.server.broker.topic.failed.fetch.requests.rate.1.min|io.confluent.kafka.server.broker.topic.total.fetch.requests.rate.1.min|io.confluent.kafka.server.partition.caught.up.replicas.count|io.confluent.kafka.server.partition.observer.replicas.count|io.confluent.kafka.server.tier.tasks.num.partitions.in.error|io.confluent.kafka.server.broker.topic.bytes.out.rate.1.min|io.confluent.kafka.server.request.total.time.ms.p95|io.confluent.kafka.server.controller.active.controller.count|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.total|io.confluent.kafka.server.request.total.time.ms.p999|io.confluent.kafka.server.controller.active.broker.count|io.confluent.kafka.server.request.handler.pool.request.handler.avg.idle.percent.rate.1.min|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.rate.1.min|io.confluent.kafka.server.controller.unclean.leader.elections.rate.1.min|io.confluent.kafka.server.replica.manager.partition.count|io.confluent.kafka.server.controller.unclean.leader.elections.total|io.confluent.kafka.server.partition.replicas.count|io.confluent.kafka.server.broker.topic.total.produce.requests.rate.1.min|io.confluent.kafka.server.controller.offline.partitions.count|io.confluent.kafka.server.socket.server.network.processor.avg.idle.percent|io.confluent.kafka.server.partition.under.replicated|io.confluent.kafka.server.log.log.start.offset|io.confluent.kafka.server.log.tier.size|io.confluent.kafka.server.log.size|io.confluent.kafka.server.tier.fetcher.bytes.fetched.total|io.confluent.kafka.server.request.total.time.ms.p50|io.confluent.kafka.server.tenant.consumer.lag.offsets|io.confluent.kafka.server.session.expire.listener.zookeeper.expires.rate.1.min|io.confluent.kafka.server.log.log.end.offset|io.confluent.kafka.server.broker.topic.bytes.in.rate.1.min|io.confluent.kafka.server.partition.under.min.isr|io.confluent.kafka.server.partition.in.sync.replicas.count|io.confluent.telemetry.http.exporter.batches.dropped|io.confluent.telemetry.http.exporter.items.total|io.confluent.telemetry.http.exporter.items.succeeded|io.confluent.telemetry.http.exporter.send.time.total.millis|io.confluent.kafka.server.controller.leader.election.rate.(?!.*delta).*|io.confluent.telemetry.http.exporter.batches.failed|org.apache.kafka.consumer.(fetch.manager.fetch.latency.avg|connection.creation.total|fetch.manager.fetch.total|fetch.manager.bytes.consumed.rate)|org.apache.kafka.producer.(bufferpool.wait.ratio|record.queue.time.avg|request.latency.avg|produce.throttle.time.avg|connection.creation.total|request.total|topic.byte.rate)|org.apache.kafka.consumer.share.fetch.manager.(fetch.latency.avg|fetch.total|bytes.consumed.rate)"
      - "confluent.consumer.lag.emitter.enabled=true"
      # Do not use in production: auto creation of topics
      - "auto.create.topics.enable=true"
  podTemplate:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
  metricReporter:
    enabled: true

---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-server-connect:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  configOverrides:
    server:
      - config.storage.replication.factor=1
      - offset.storage.replication.factor=1
      - status.storage.replication.factor=1
    #log4j2:
    #  Configuration:
    #    Appenders:
    #      Console:
    #        - name: stdout
    #          target: SYSTEM_OUT
    #    Loggers:
    #      Root:
    #        - name: stdout
    #          level: DEBUG
    #          AppenderRef:
    #            - ref: stdout
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 1G
    probe:
      liveness:
        periodSeconds: 10
        failureThreshold: 5
        timeoutSeconds: 500
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
  keyConverterType: io.confluent.connect.avro.AvroConverter
  valueConverterType: io.confluent.connect.avro.AvroConverter
  build:
    type: onDemand
    onDemand:
      plugins:
        confluentHub:
          - name: kafka-connect-datagen
            owner: confluentinc
            version: latest
  dependencies:
      kafka:
        bootstrapEndpoint: http://kafka.confluent.svc.cluster.local:9071
      schemaRegistry:
        url: http://schemaregistry.confluent.svc.cluster.local:8081

---
apiVersion: platform.confluent.io/v1beta1
kind: KsqlDB
metadata:
  name: ksqldb
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-ksqldb-server:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  dataVolumeCapacity: 10Gi
  internalTopicReplicationFactor: 1
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9092
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    probe:
      liveness:
        periodSeconds: 10
        failureThreshold: 5
        timeoutSeconds: 500 
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-enterprise-control-center-next-gen:2.6.0
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  podTemplate:
    probe:
      startup:
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 30
        timeoutSeconds: 5
#      liveness:
#        periodSeconds: 15
#        failureThreshold: 3
#        timeoutSeconds: 5
#        initialDelaySeconds: 300
#      readiness:
#        initialDelaySeconds: 300
#        periodSeconds: 10
#        failureThreshold: 4
#        timeoutSeconds: 5
  dataVolumeCapacity: 10Gi
  configOverrides:
    server:
      - "confluent.controlcenter.command.topic.replication=1"
      - "confluent.controlcenter.internal.topics.replication=1"
      - "confluent.metrics.topic.replication=1"
      - "confluent.monitoring.interceptor.topic.replication=1"
      - "confluent.controlcenter.telemetry.enabled=true"
      - "confluent.controlcenter.ksql.ksqldb.advertised.url=http://ksqldb"
      # Using new separate flink UI instead. Go to http://flink with your browser
      #- "confluent.controlcenter.cmf.enable=true"
      #- "confluent.controlcenter.cmf.url=http://cmf-service.flink.svc.cluster.local"
      #- confluent.controlcenter.replication.factor=1
      #- confluent.metrics.reporter.topic.replicas=1
  dependencies:
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
    ksqldb:
    - name: ksqldb
      url: http://ksqldb.confluent.svc.cluster.local:8088
    connect:
    - name: connect
      url: http://connect.confluent.svc.cluster.local:8083
    kafka:
      bootstrapEndpoint: http://kafka.confluent.svc.cluster.local:9071
    prometheusClient:
      url: http://controlcenter.confluent.svc.cluster.local:9090
    alertManagerClient:
      url: http://controlcenter.confluent.svc.cluster.local:9093
  services:
    prometheus:
      image: docker.io/confluentinc/cp-enterprise-prometheus:2.5.0
      pvc:
        dataVolumeCapacity: 10Gi
    alertmanager:
      image: docker.io/confluentinc/cp-enterprise-alertmanager:2.5.0
---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-schema-registry:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestProxy
metadata:
  name: kafkarestproxy
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-kafka-rest:8.2.2
    init: docker.io/confluentinc/confluent-init-container:3.3.0
  dependencies:
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
# Schema Registry
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: schemaregistry
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: schemaregistry
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: schemaregistry
            port:
              number: 8081
---
# ksqlDB
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ksqldb
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: ksqldb
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ksqldb
            port:
              number: 8088
---
# Bootstrap server + broker
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: kafka
  namespace: confluent
spec:
  entryPoints:
  - kafka
  routes:
  - match: HostSNI(`*`)
    priority: 1
    services:
    - name: kafka
      namespace: confluent
      port: 9092
---
# Metadata service (mds)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mds
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: mds
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kafka
            port:
              number: 8090
---
# Control center via SNI on http://controlcenter on Port 80 (create alias in /etc/hosts from "controlcenter" to 127.0.0.1)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: controlcenter
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: controlcenter
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: controlcenter
            port:
              number: 9021
---
# Prometheus, bundled with Control center via SNI on http://prometheus on Port 80 (create alias in /etc/hosts from "prometheus" to 127.0.0.1)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: prometheus
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: controlcenter
            port:
              number: 9090
---
# Control center directly through port 9021
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: controlcenter
  namespace: confluent
spec:
  entryPoints:
    - controlcenter
  routes:
  - match: HostSNI(`*`)
    priority: 1
    services:
    - name: controlcenter
      port: 9021
---
# MDS directly through port 8090
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mds
  namespace: confluent
spec:
  entryPoints:
    - mds
  routes:
  - match: HostSNI(`*`)
    priority: 1
    services:
    - name: kafka
      port: 8090
