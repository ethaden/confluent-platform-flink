apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  replicas: 1
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
  dataVolumeCapacity: 10Gi
  configOverrides:
    server:
      - "confluent.license.topic.replication.factor=1"
      - "confluent.metrics.reporter.topic.replicas=1"
      - "confluent.tier.metadata.replication.factor=1"
      - "confluent.metadata.topic.replication.factor=1"
      - "confluent.balancer.topic.replication.factor=1"
      - "confluent.security.event.logger.exporter.kafka.topic.replicas=1"
      - "event.logger.exporter.kafka.topic.replicas=1"
      - "confluent.cluster.link.metadata.topic.replication.factor=1"
      - "share.coordinator.state.topic.replication.factor=1"
      - "quotas.topic.replication.factor=1"
      - "offsets.topic.replication.factor=1"
      - "confluent.durability.topic.replication.factor=1"
      - "confluent.balancer.enable=false"
      - "confluent.cluster.link.enable=true"
      - "metric.reporters=io.confluent.telemetry.reporter.TelemetryReporter"
      - "confluent.telemetry.enabled=true"
      - "password.encoder.secret=secret"
      - "confluent.telemetry.exporter._c3.enabled=true"
      - "confluent.telemetry.exporter._c3.type=http"
      - "confluent.telemetry.exporter._c3.client.base.url=http://controlcenter:9090/api/v1/otlp"
      - "confluent.telemetry.exporter._c3.client.compression=gzip"
      #- "confluent.telemetry.exporter._c3.api.key=dummy"
      #- "confluent.telemetry.exporter._c3.api.secret=dummy"
      - "confluent.telemetry.metrics.collector.interval.ms=60000"
      - "confluent.telemetry.remoteconfig._confluent.enabled=false"
      - "confluent.consumer.lag.emitter.enabled=true"
  podTemplate:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
  metricReporter:
    enabled: true
---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-server-connect:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  configOverrides:
    server:
      - config.storage.replication.factor=1
      - offset.storage.replication.factor=1
      - status.storage.replication.factor=1
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
    probe:
      liveness:
        periodSeconds: 10
        failureThreshold: 5
        timeoutSeconds: 500 
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true  
---
apiVersion: platform.confluent.io/v1beta1
kind: KsqlDB
metadata:
  name: ksqldb
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-ksqldb-server:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  dataVolumeCapacity: 10Gi
  internalTopicReplicationFactor: 1
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9092
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    probe:
      liveness:
        periodSeconds: 10
        failureThreshold: 5
        timeoutSeconds: 500 
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    init: confluentinc/confluent-init-container:3.1.0
  dataVolumeCapacity: 10Gi
  configOverrides:
    server:
      - "confluent.controlcenter.command.topic.replication=1"
      - "confluent.controlcenter.internal.topics.replication=1"
      - "confluent.metrics.topic.replication=1"
      - "confluent.monitoring.interceptor.topic.replication=1"
      - "confluent.controlcenter.telemetry.enabled=true"
      - "confluent.controlcenter.ksql.ksqldb.advertised.url=http://ksqldb"
      - "confluent.controlcenter.cmf.enable=true"
      - "confluent.controlcenter.cmf.url=http://cmf-service.flink.svc.cluster.local"
      #- confluent.controlcenter.replication.factor=1
      #- confluent.metrics.reporter.topic.replicas=1
  dependencies:
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
    ksqldb:
    - name: ksqldb
      url: http://ksqldb.confluent.svc.cluster.local:8088
    connect:
    - name: connect
      url: http://connect.confluent.svc.cluster.local:8083
    kafka:
      bootstrapEndpoint: http://kafka.confluent.svc.cluster.local:9071
    prometheusClient:
      url: http://controlcenter.confluent.svc.cluster.local:9090
    alertManagerClient:
      url: http://controlcenter.confluent.svc.cluster.local:9093
  services:
    prometheus:
      image: confluentinc/cp-enterprise-prometheus:2.5.0
      pvc:
        dataVolumeCapacity: 10Gi
    alertmanager:
      image: confluentinc/cp-enterprise-alertmanager:2.5.0
---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-schema-registry:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestProxy
metadata:
  name: kafkarestproxy
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-kafka-rest:8.2.1
    init: confluentinc/confluent-init-container:3.2.2
  dependencies:
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
---
# Schema Registry
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: schemaregistry
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: schemaregistry
spec:
  rules:
  - host: schemaregistry
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: schemaregistry
            port:
              number: 8081
---
# ksqlDB
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ksqldb
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: ksqldb
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ksqldb
            port:
              number: 8088
---
# Bootstrap server + broker
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: kafka
  namespace: confluent
spec:
  entryPoints:
    - kafka
  routes:
  - match: HostSNI(`*`)
    priority: 1
    services:
    - name: kafka
      port: 9092
---
# Metadata service (mds)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mds
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: mds
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kafka
            port:
              number: 8090
---
# Control center via SNI on http://controlcenter on Port 80 (create alias in /etc/hosts from "controlcenter" to 127.0.0.1)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka
  namespace: confluent
  annotations:
    kubernetes.io/ingress.classname: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: controlcenter
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: controlcenter
            port:
              number: 9021
---
# Control center directly through port 9021
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: kafka
  namespace: confluent
spec:
  entryPoints:
    - controlcenter
  routes:
  - match: HostSNI(`*`)
    priority: 1
    services:
    - name: controlcenter
      port: 9021
